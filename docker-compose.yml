version: "3.9"

services:

  api:

    build: .

    container_name: fastapi_app

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    depends_on:
      - postgres
      - redis

    environment:
      DATABASE_URL: postgresql://postgres:archi123@postgres:5432/ai_notes

  postgres:

    image: postgres:15

    container_name: postgres_db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: archi123
      POSTGRES_DB: ai_notes

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:

    image: redis:7

    container_name: redis_server

    ports:
      - "6379:6379"

  celery:

    build: .

    command: celery -A app.celery_worker.celery worker --pool=solo --loglevel=info

    depends_on:
      - redis

    volumes:
      - .:/app

volumes:
  postgres_data: